
[functions.ai-scheduler]
enabled = true
verify_jwt = true
import_map = "./functions/ai-scheduler/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/ai-scheduler/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/ai-scheduler/*.html" ]

[functions.meta-forms-sync]
enabled = true
# Disparada pelo pg_cron (sem JWT), igual à whatsapp-sync-status.
verify_jwt = false
entrypoint = "./functions/meta-forms-sync/index.ts"

[functions.forms-welcome-followup]
enabled = true
# Disparada por pg_net a partir de process_forms_followup() (sem JWT).
verify_jwt = false
entrypoint = "./functions/forms-welcome-followup/index.ts"

[functions.reengagement-followup]
enabled = true
# Disparada por pg_net a partir de process_reengagement_followup() (sem JWT).
verify_jwt = false
entrypoint = "./functions/reengagement-followup/index.ts"

[functions.meta-cloud-api]
enabled = true
# Chamada pelo frontend (functions.invoke manda o JWT do usuário).
verify_jwt = true
entrypoint = "./functions/meta-cloud-api/index.ts"

[functions.meta-cloud-webhook]
enabled = true
# Callback da WhatsApp Cloud API oficial — a Meta chama sem Authorization.
verify_jwt = false
entrypoint = "./functions/meta-cloud-webhook/index.ts"

[functions.conv-ai-analyst]
enabled = true
# Disparada pelo pg_cron via system_http_post (sem JWT).
verify_jwt = false
entrypoint = "./functions/conv-ai-analyst/index.ts"

[functions.conv-ai-learn]
enabled = true
# Disparada pelo pg_cron via system_http_post (sem JWT).
verify_jwt = false
entrypoint = "./functions/conv-ai-learn/index.ts"

[functions.chat-send]
enabled = true
# Chamada pelo frontend (functions.invoke manda o JWT do usuário) e a função ainda valida o uid
# por dentro. Estava fora deste arquivo e o valor real em produção era true — registrado aqui para
# um deploy futuro não derrubar o envio manual sem querer.
verify_jwt = true
entrypoint = "./functions/chat-send/index.ts"

[functions.emissor-worker]
enabled = true
# Disparada pelo pg_cron via system_http_post (sem JWT), igual ao ai-agent-worker. So drena a fila
# outbound_messages, que apenas service_role popula.
verify_jwt = false
entrypoint = "./functions/emissor-worker/index.ts"

[functions.ai-sandbox]
enabled = true
# Chamada pelo frontend (Super Admin) com o JWT do usuario; a funcao valida is_super_admin por dentro.
verify_jwt = true
entrypoint = "./functions/ai-sandbox/index.ts"
